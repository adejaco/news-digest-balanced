name: Daily News Digest

on:
  schedule:
    - cron: '0 8 * * *'  # 6am ET — adjust if needed (times are UTC)
  workflow_dispatch:       # lets you trigger it manually from GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser fpdf2

      - name: Run news aggregator
        run: python news_aggregator.py

      - name: Commit and push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update news digest $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
